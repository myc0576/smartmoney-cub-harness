name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Doctor
        run: smcub doctor

      - name: Loop demo English
        run: smcub loop --preset toy --agent-trigger "loop"

      - name: Loop demo Chinese
        run: smcub loop --preset toy --agent-trigger "自进化"
